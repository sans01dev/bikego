<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>내 근처 시장가기 v0.8</title>
<style>
  :root{
    --pri:#C5413B; --pri-d:#9E2F2A; --pri-soft:#FBE6E3;
    --bg:#FDF6F4; --card:#FFFFFF; --line:#F1E2DD;
    --tx:#2A2118; --sub:#7A6A59; --mut:#A99B8C;
    --ok:#1B9C6B; --okbg:#E3F6ED; --per:#E08A12; --perbg:#FDF0DA;
    --shadow:0 2px 10px rgba(120,80,40,.08);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--tx); font-size:15px; line-height:1.6;
    font-weight:600; -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}

  /* ===== INTRO ===== */
  #intro{
    position:fixed; inset:0; z-index:50; background:linear-gradient(160deg,#E0584F,#C5413B 55%,#9E2F2A);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#fff; padding:32px; transition:opacity .35s, visibility .35s;
  }
  #intro.hide{opacity:0; visibility:hidden;}
  .intro-emoji{font-size:74px; line-height:1; margin-bottom:18px; filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));}
  .intro-title{font-size:31px; font-weight:800; letter-spacing:-1px; margin-bottom:10px;}
  .intro-sub{font-size:16px; font-weight:600; opacity:.95; line-height:1.55; margin-bottom:40px; max-width:300px;}
  .intro-btn{
    background:#fff; color:var(--pri-d); font-size:18px; font-weight:800;
    padding:17px 34px; border-radius:16px; box-shadow:0 6px 18px rgba(0,0,0,.18);
    display:inline-flex; align-items:center; gap:8px;
  }
  .intro-note{margin-top:18px; font-size:13px; opacity:.85; font-weight:600;}

  /* ===== HEADER ===== */
  header{
    position:sticky; top:0; z-index:20; background:var(--card);
    padding:9px 14px 5px; border-bottom:1px solid var(--line);
  }
  .h-top{display:flex; align-items:center; justify-content:space-between;}
  .h-title{font-size:17px; font-weight:800; letter-spacing:-.5px; color:var(--pri-d);}
  .h-loc{font-size:12px; font-weight:700; color:var(--pri); background:var(--pri-soft); padding:6px 11px; border-radius:10px; white-space:nowrap;}

  .search{
    margin-top:8px; display:flex; align-items:center; gap:8px;
    background:var(--bg); border:1.5px solid var(--line); border-radius:12px; padding:9px 12px;
  }
  .search input{flex:1; border:none; background:none; font-size:14px; font-weight:600; color:var(--tx); outline:none;}
  .search input::placeholder{color:var(--mut); font-weight:600;}

  .filters{display:flex; gap:6px; overflow-x:auto; padding:6px 0 2px; -webkit-overflow-scrolling:touch;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; font-size:12.5px; font-weight:700; color:var(--sub);
    background:var(--card); border:1.5px solid var(--line); border-radius:16px; padding:6px 11px; white-space:nowrap;
  }
  .chip.on{background:var(--pri); color:#fff; border-color:var(--pri);}

  .sortbar{display:flex; align-items:center; gap:6px; padding:5px 0 3px;}
  .sort{font-size:12.5px; font-weight:700; color:var(--mut); padding:5px 10px; border-radius:9px;}
  .sort.on{color:var(--pri-d); background:var(--pri-soft);}
  .count{margin-left:auto; align-self:center; font-size:12px; font-weight:700; color:var(--mut);}

  .advBtn{display:inline-flex; align-items:center; gap:4px; font-size:12.5px; font-weight:800; color:var(--sub); background:var(--card); border:1.5px solid var(--line); padding:5px 10px; border-radius:9px;}
  .advBtn .on-cnt{color:#fff; background:var(--pri); border-radius:8px; padding:0 6px; font-size:11px;}

  .region{display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:800; color:var(--pri-d); background:var(--pri-soft); padding:9px 15px; border-radius:12px;}
  .region b{color:var(--pri);}
  .region-wide{display:flex; width:100%; justify-content:center; margin:8px 0 4px; box-sizing:border-box;}

  .sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.42); z-index:40;}
  .sheet{position:fixed; left:0; right:0; bottom:0; z-index:41; background:var(--card); border-radius:24px 24px 0 0; padding:18px 16px calc(20px + env(safe-area-inset-bottom)); max-height:80vh; overflow-y:auto; box-shadow:0 -4px 22px rgba(0,0,0,.16);}
  .sheet-h{font-size:18px; font-weight:800; color:var(--tx); margin-bottom:15px; text-align:center;}
  .sheet-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
  .sheet-item{font-size:15px; font-weight:800; color:var(--tx); background:var(--bg); border:1.5px solid var(--line); border-radius:13px; padding:13px 6px; text-align:center;}
  .sheet-item.on{background:var(--pri); color:#fff; border-color:var(--pri);}
  .sheet-item small{display:block; font-size:11px; font-weight:600; color:var(--mut); margin-top:3px;}
  .sheet-item.on small{color:rgba(255,255,255,.85);}

  /* ===== LIST ===== */
  #list{padding:8px 14px 30px;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:15px 16px; margin-bottom:12px; box-shadow:var(--shadow);
  }
  .c-top{display:flex; align-items:flex-start; gap:8px;}
  .c-name{font-size:18px; font-weight:800; letter-spacing:-.5px; line-height:1.35; flex:1;}
  .c-dist{font-size:14px; font-weight:800; color:var(--pri-d); white-space:nowrap; padding-top:2px;}
  .badge{display:inline-block; font-size:11.5px; font-weight:800; padding:3px 9px; border-radius:8px; margin-top:6px;}
  .b-on{background:var(--okbg); color:var(--ok);}
  .b-per{background:var(--perbg); color:var(--per);}
  .c-addr{font-size:13.5px; font-weight:600; color:var(--sub); margin-top:9px; line-height:1.5;}
  .c-meta{display:flex; flex-wrap:wrap; gap:6px 14px; margin-top:10px; font-size:13px; font-weight:700; color:var(--sub);}
  .c-meta b{color:var(--tx); font-weight:800;}
  .c-tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:11px;}
  .tag{font-size:12px; font-weight:700; color:var(--pri-d); background:var(--pri-soft); padding:4px 10px; border-radius:8px;}
  .c-actions{display:flex; gap:8px; margin-top:14px;}
  .act{
    flex:1; display:flex; align-items:center; justify-content:center; gap:5px;
    font-size:14px; font-weight:800; padding:11px 0; border-radius:12px;
  }
  .act-go{background:var(--pri); color:#fff;}
  .act-tel{background:var(--bg); color:var(--tx); border:1.5px solid var(--line);}
  .act-sh{background:var(--bg); color:var(--tx); border:1.5px solid var(--line); flex:0 0 50px;}
  .act-fav{background:var(--bg); color:var(--mut); border:1.5px solid var(--line); flex:0 0 50px; font-size:18px;}
  .act-fav.on{color:#E8B400; background:#FFF7DC; border-color:#FFE49A;}

  .empty{text-align:center; color:var(--mut); padding:60px 20px; font-size:15px; font-weight:700; line-height:1.7;}

  /* ===== WEATHER ===== */
  .weather{
    margin:11px 14px 0; background:linear-gradient(135deg,#FCEEEA,#F8DED7);
    border:1px solid var(--line); border-radius:14px; padding:12px 15px;
    display:flex; align-items:center; gap:13px; box-shadow:var(--shadow);
  }
  .w-ic{font-size:34px; line-height:1;}
  .w-main{flex:1; min-width:0;}
  .w-temp{font-size:20px; font-weight:800; color:var(--tx);}
  .w-temp small{font-size:13px; font-weight:700; color:var(--sub); margin-left:7px;}
  .w-msg{font-size:13px; font-weight:700; color:var(--pri-d); margin-top:2px;}

  /* ===== 장날 ===== */
  .c-jang{
    margin-top:11px; background:var(--perbg); border-radius:11px; padding:9px 12px;
    font-size:13px; font-weight:700; color:#8a5a08; line-height:1.55;
  }
  .c-jang b{color:var(--per); font-weight:800;}
  .jn-today{color:#fff; background:var(--per); padding:2px 9px; border-radius:7px; font-weight:800;}

  /* ===== TABS ===== */
  .tabs{
    position:sticky; bottom:0; z-index:20; display:flex; background:var(--card);
    border-top:1px solid var(--line); padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  .tab{flex:1; text-align:center; font-size:11.5px; font-weight:700; color:var(--mut); padding:6px 0;}
  .tab .ic{font-size:21px; display:block; line-height:1.2;}
  .tab.on{color:var(--pri);}

  .hidden{display:none !important;}
</style>
</head>
<body>

<div id="intro">
  <div class="intro-emoji">🛒</div>
  <div class="intro-title">내 근처 시장가기</div>
  <div class="intro-sub">내 주변 전통시장을 거리순으로<br>한눈에. 장날·주차·취급품목까지.</div>
  <button class="intro-btn" onclick="start()">📍 내 주변 시장 찾기</button>
  <div class="intro-note">전국 1,377개 전통시장 · 위치기반</div>
</div>

<header class="hidden" id="hd">
  <div class="h-top">
    <div class="h-title">🛒 내 근처 시장가기</div>
    <button class="h-loc" id="loc" onclick="locate()">위치 확인 중…</button>
  </div>
  <div id="regionBar" class="hidden">
    <div class="search">
      <span>🔎</span>
      <input id="q" type="text" placeholder="시장 이름·지역 검색" oninput="render()">
    </div>
    <button class="region region-wide" onclick="openSheet()">🗺️ 지역 · <b id="regLabel">전국</b> ▾</button>
  </div>
  <div class="filters" id="typeFilters">
    <button class="chip on" data-type="all" onclick="setType(this)">전체</button>
    <button class="chip" data-type="open" onclick="setType(this)">상설</button>
    <button class="chip" data-type="per" onclick="setType(this)">정기장</button>
  </div>
  <div class="filters" id="itemFilters"></div>
  <div class="sortbar">
    <button class="advBtn" id="advBtn" onclick="toggleAdv()">🔧 상세<span class="on-cnt" id="advCount" style="display:none">0</span><span id="advArrow">▾</span></button>
    <button class="sort on" data-sort="dist" onclick="setSort(this)">거리순</button>
    <button class="sort" data-sort="shop" onclick="setSort(this)">점포순</button>
    <span class="count" id="count"></span>
  </div>
  <div id="advPanel" class="hidden">
    <div class="filters" id="facilityFilters">
      <button class="chip" data-fac="pk" onclick="toggleFac(this)">🅿️ 주차</button>
      <button class="chip" data-fac="wc" onclick="toggleFac(this)">🚻 화장실</button>
    </div>
    <div class="filters" id="radiusFilters">
      <button class="chip on" data-r="0" onclick="setRadius(this)">반경 전체</button>
      <button class="chip" data-r="5" onclick="setRadius(this)">5km</button>
      <button class="chip" data-r="10" onclick="setRadius(this)">10km</button>
      <button class="chip" data-r="20" onclick="setRadius(this)">20km</button>
    </div>
    <div class="filters" id="sizeFilters">
      <button class="chip on" data-sz="" onclick="setSize(this)">규모 전체</button>
      <button class="chip" data-sz="l" onclick="setSize(this)">대형</button>
      <button class="chip" data-sz="m" onclick="setSize(this)">중형</button>
      <button class="chip" data-sz="s" onclick="setSize(this)">소형</button>
    </div>
  </div>
</header>

<div id="weather" class="weather hidden"></div>

<div id="list" class="hidden"></div>

<nav class="tabs hidden" id="tabs">
  <button class="tab on" data-tab="near" onclick="setTab(this)"><span class="ic">📍</span>내 주변</button>
  <button class="tab" data-tab="region" onclick="setTab(this)"><span class="ic">🗺️</span>지역</button>
  <button class="tab" data-tab="per" onclick="setTab(this)"><span class="ic">📅</span>장날</button>
  <button class="tab" data-tab="fav" onclick="setTab(this)"><span class="ic">⭐</span>즐겨찾기</button>
</nav>

<div class="sheet-bg hidden" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet hidden" id="sheet">
  <div class="sheet-h">지역 선택</div>
  <div class="sheet-grid" id="sheetGrid"></div>
</div>

var SIDO_ORDER = ["서울","경기","인천","강원","충북","충남","대전","세종","전북","전남","광주","경북","경남","대구","울산","부산","제주"];
function shortSido(a){
  if(!a) return "기타";
  if(a.indexOf("서울")===0) return "서울";
  if(a.indexOf("부산")===0) return "부산";
  if(a.indexOf("대구")===0) return "대구";
  if(a.indexOf("인천")===0) return "인천";
  if(a.indexOf("광주")===0) return "광주";
  if(a.indexOf("대전")===0) return "대전";
  if(a.indexOf("울산")===0) return "울산";
  if(a.indexOf("세종")===0) return "세종";
  if(a.indexOf("경기")===0) return "경기";
  if(a.indexOf("강원")===0) return "강원";
  if(a.indexOf("충청북")===0||a.indexOf("충북")===0) return "충북";
  if(a.indexOf("충청남")===0||a.indexOf("충남")===0) return "충남";
  if(a.indexOf("전라북")===0||a.indexOf("전북")===0) return "전북";
  if(a.indexOf("전라남")===0||a.indexOf("전남")===0) return "전남";
  if(a.indexOf("경상북")===0||a.indexOf("경북")===0) return "경북";
  if(a.indexOf("경상남")===0||a.indexOf("경남")===0) return "경남";
  if(a.indexOf("제주")===0) return "제주";
  return "기타";
}
function initSido(){ for(var i=0;i<MARKETS.length;i++){ MARKETS[i]._sido = shortSido(MARKETS[i].ad); } }
function buildSheet(){
  var cnt={}; for(var i=0;i<MARKETS.length;i++){ var s=MARKETS[i]._sido; cnt[s]=(cnt[s]||0)+1; }
  var html='<button class="sheet-item'+(state.sido?'':' on')+'" onclick="pickSido(null)">전국<small>'+MARKETS.length+'</small></button>';
  for(var k=0;k<SIDO_ORDER.length;k++){
    var s=SIDO_ORDER[k]; if(!cnt[s]) continue;
    html+='<button class="sheet-item'+(state.sido===s?' on':'')+'" onclick="pickSido(\''+s+'\')">'+s+'<small>'+cnt[s]+'</small></button>';
  }
  document.getElementById("sheetGrid").innerHTML=html;
}
function openSheet(){ buildSheet(); document.getElementById("sheetBg").classList.remove("hidden"); document.getElementById("sheet").classList.remove("hidden"); }
function closeSheet(){ document.getElementById("sheetBg").classList.add("hidden"); document.getElementById("sheet").classList.add("hidden"); }
function pickSido(s){
  state.sido=s;
  var lbl=document.getElementById("regLabel"); if(lbl) lbl.textContent=s||"전국";
  closeSheet(); render();
}
function toggleFac(b){
  var f=b.dataset.fac; state[f]=!state[f]; b.classList.toggle("on", state[f]); updateAdvCount(); render();
}
function toggleAdv(){
  var p=document.getElementById("advPanel");
  var hidden=p.classList.toggle("hidden");
  document.getElementById("advArrow").textContent = hidden ? "▾" : "▴";
}
function setRadius(b){ document.querySelectorAll("#radiusFilters .chip").forEach(function(c){c.classList.remove("on");}); b.classList.add("on"); state.radius=parseInt(b.dataset.r,10)||0; updateAdvCount(); render(); }
function setSize(b){ document.querySelectorAll("#sizeFilters .chip").forEach(function(c){c.classList.remove("on");}); b.classList.add("on"); state.size=b.dataset.sz||""; updateAdvCount(); render(); }
function updateAdvCount(){
  var n=(state.pk?1:0)+(state.wc?1:0)+(state.radius?1:0)+(state.size?1:0);
  var el=document.getElementById("advCount");
  el.textContent=n; el.style.display = n? "inline-block":"none";
}

// ---- 취급품목 필터칩 동적 생성 ----
function buildItemChips(){
  var counts = {};
  for(var i=0;i<MARKETS.length;i++){
    var its = MARKETS[i].it||[];
    for(var j=0;j<its.length;j++){ counts[its[j]] = (counts[its[j]]||0)+1; }
  }
  var arr = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a]; });
  var box = document.getElementById("itemFilters");
  var html = '<button class="chip on" data-item="" onclick="setItem(this)">전체품목</button>';
  for(var k=0;k<arr.length;k++){
    html += '<button class="chip" data-item="'+arr[k]+'" onclick="setItem(this)">'+arr[k]+'</button>';
  }
  box.innerHTML = html;
}

function start(){
  document.getElementById("intro").classList.add("hide");
  document.getElementById("hd").classList.remove("hidden");
  document.getElementById("list").classList.remove("hidden");
  document.getElementById("tabs").classList.remove("hidden");
  buildItemChips();
  initSido();
  locate();
}

function locate(){
  var el = document.getElementById("loc");
  el.textContent = "위치 확인 중…";
  if(!navigator.geolocation){ el.textContent = "위치 미지원"; render(); return; }
  navigator.geolocation.getCurrentPosition(function(p){
    state.lat = p.coords.latitude; state.lng = p.coords.longitude;
    el.textContent = "📍 현재 위치";
    render();
    fetchWeather(state.lat, state.lng);
  }, function(){
    el.textContent = "전국 표시";
    state.lat = null; state.lng = null;
    document.getElementById("weather").classList.add("hidden");
    render();
  }, { enableHighAccuracy:true, timeout:8000, maximumAge:60000 });
}

// ---- 날씨 (Open-Meteo, 무료·키 불필요) ----
function fetchWeather(lat,lng){
  var w=document.getElementById("weather");
  var url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&current_weather=true&timezone=auto";
  fetch(url).then(function(r){return r.json();}).then(function(j){
    var c=j.current_weather; if(!c){ w.classList.add("hidden"); return; }
    var info=wmo(c.weathercode, c.is_day);
    w.innerHTML='<div class="w-ic">'+info.ic+'</div>'+
      '<div class="w-main">'+
        '<div class="w-temp">'+Math.round(c.temperature)+'°<small>'+info.txt+' · 바람 '+Math.round(c.windspeed)+'km/h</small></div>'+
        '<div class="w-msg">'+info.msg+'</div>'+
      '</div>';
    w.classList.remove("hidden");
  }).catch(function(){ w.classList.add("hidden"); });
}
function wmo(code,day){
  var d = day!==0;
  if(code===0) return {ic:d?"☀️":"🌙", txt:"맑음", msg:"시장 나들이 딱 좋은 날이에요"};
  if(code===1||code===2) return {ic:d?"🌤️":"☁️", txt:"구름 조금", msg:"시장 둘러보기 좋아요"};
  if(code===3) return {ic:"☁️", txt:"흐림", msg:"우산 챙겨두면 안심이에요"};
  if(code===45||code===48) return {ic:"🌫️", txt:"안개", msg:"길 조심하세요"};
  if(code>=51&&code<=57) return {ic:"🌦️", txt:"이슬비", msg:"우산 챙기세요"};
  if(code>=61&&code<=67) return {ic:"🌧️", txt:"비", msg:"우산 꼭 챙기세요"};
  if(code>=71&&code<=77) return {ic:"🌨️", txt:"눈", msg:"길 미끄러워요, 조심!"};
  if(code>=80&&code<=82) return {ic:"🌦️", txt:"소나기", msg:"우산 챙기세요"};
  if(code>=85&&code<=86) return {ic:"🌨️", txt:"눈", msg:"길 미끄러워요, 조심!"};
  if(code>=95) return {ic:"⛈️", txt:"뇌우", msg:"외출은 잠시 미뤄도 좋아요"};
  return {ic:"🌡️", txt:"", msg:"오늘도 좋은 하루!"};
}

// ---- 장날 계산 ----
function parseDays(cy){
  var disp=[], digits=[];
  if(!cy) return {disp:disp, digits:digits};
  var parts=cy.split("+");
  for(var i=0;i<parts.length;i++){
    var n=parseInt(parts[i].replace(/[^0-9]/g,""),10);
    if(!isNaN(n)){ disp.push(n); digits.push(n%10); }
  }
  return {disp:disp, digits:digits};
}
function nextJangnal(digits){
  var now=new Date(); now.setHours(0,0,0,0);
  for(var i=0;i<32;i++){
    var dt=new Date(now); dt.setDate(now.getDate()+i);
    if(digits.indexOf(dt.getDate()%10)>=0){
      return {isToday:i===0, daysAway:i, m:dt.getMonth()+1, d:dt.getDate()};
    }
  }
  return null;
}
function jangBlock(m){
  if(m.t.indexOf("일장")<0) return "";
  var pd=parseDays(m.cy);
  if(!pd.digits.length) return "";
  var nx=nextJangnal(pd.digits);
  var also = m.t.indexOf("상설")>=0 ? " · 평소엔 매일" : "";
  var line;
  if(nx && nx.isToday){ line='<span class="jn-today">🎉 오늘 장날!</span>'; }
  else if(nx){
    var rel = nx.daysAway===1 ? "내일" : nx.daysAway+"일 뒤";
    line='다음 장날 <b>'+nx.m+"/"+nx.d+'</b> ('+rel+')';
  } else { line=""; }
  return '<div class="c-jang">📅 끝자리 <b>'+pd.disp.join("·")+'일</b> 장날'+also+(line?('<br>'+line):"")+'</div>';
}

function dist(la,lo){
  if(state.lat==null) return null;
  var R=6371, dLa=(la-state.lat)*Math.PI/180, dLo=(lo-state.lng)*Math.PI/180;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(state.lat*Math.PI/180)*Math.cos(la*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(d){
  if(d==null) return "";
  if(d<1) return Math.round(d*1000)+"m";
  return d.toFixed(1)+"km";
}
function isPer(m){ return m.t.indexOf("일장")>=0; }

function setType(b){ document.querySelectorAll("#typeFilters .chip").forEach(function(c){c.classList.remove("on");}); b.classList.add("on"); state.type=b.dataset.type; render(); }
function setItem(b){ document.querySelectorAll("#itemFilters .chip").forEach(function(c){c.classList.remove("on");}); b.classList.add("on"); state.item=b.dataset.item||null; render(); }
function setSort(b){ document.querySelectorAll(".sort").forEach(function(c){c.classList.remove("on");}); b.classList.add("on"); state.sort=b.dataset.sort; render(); }
function setTab(b){
  document.querySelectorAll(".tab").forEach(function(c){c.classList.remove("on");}); b.classList.add("on");
  state.tab=b.dataset.tab;
  document.getElementById("regionBar").classList.toggle("hidden", state.tab!=="region");
  // 탭에 따라 상단 타입필터 동기화
  if(state.tab==="per"){ state.type="per"; }
  else if(state.tab==="near"){ if(state.type==="per") state.type="all"; }
  syncTypeChips();
  render();
}
function syncTypeChips(){
  document.querySelectorAll("#typeFilters .chip").forEach(function(c){
    c.classList.toggle("on", c.dataset.type===state.type);
  });
}

function render(){
  var q = (document.getElementById("q").value||"").trim();
  var arr = MARKETS.filter(function(m){
    if(state.tab==="fav" && fav.indexOf(m.n+"|"+m.la)<0) return false;
    if(state.tab==="region" && state.sido && m._sido!==state.sido) return false;
    if(state.pk && !m.pk) return false;
    if(state.wc && !m.wc) return false;
    if(state.radius>0){ var dd=dist(m.la,m.lo); if(dd!=null && dd>state.radius) return false; }
    if(state.size){ var n=parseInt(m.sp,10)||0;
      if(state.size==="l" && n<100) return false;
      if(state.size==="m" && (n<30||n>99)) return false;
      if(state.size==="s" && n>29) return false;
    }
    if(state.type==="open" && isPer(m)) return false;
    if(state.type==="per" && !isPer(m)) return false;
    if(state.item && (m.it||[]).indexOf(state.item)<0) return false;
    if(state.tab==="region" && q && (m.n+m.ad).indexOf(q)<0) return false;
    return true;
  });
  arr.forEach(function(m){ m._d = dist(m.la,m.lo); });
  if(state.tab==="per" && state.sort==="dist"){
    arr.forEach(function(m){ var pd=parseDays(m.cy); var nx=pd.digits.length?nextJangnal(pd.digits):null; m._jn = nx?nx.daysAway:99; });
    arr.sort(function(a,b){
      if(a._jn!==b._jn) return a._jn-b._jn;
      if(a._d==null && b._d==null) return 0;
      if(a._d==null) return 1; if(b._d==null) return -1;
      return a._d-b._d;
    });
  } else if(state.sort==="shop"){
    arr.sort(function(a,b){ return (parseInt(b.sp)||0)-(parseInt(a.sp)||0); });
  } else {
    arr.sort(function(a,b){
      if(a._d==null && b._d==null) return a.n.localeCompare(b.n,"ko");
      if(a._d==null) return 1; if(b._d==null) return -1;
      return a._d-b._d;
    });
  }

  document.getElementById("count").textContent = arr.length+"개";
  var list = document.getElementById("list");
  if(arr.length===0){
    var msg = state.tab==="fav" ? "즐겨찾기한 시장이 없어요.<br>카드의 ⭐를 눌러 담아보세요." : "조건에 맞는 시장이 없어요.";
    list.innerHTML = '<div class="empty">'+msg+'</div>';
    return;
  }
  var shown = arr.slice(0, 120);
  var html = "";
  for(var i=0;i<shown.length;i++){ html += cardHTML(shown[i]); }
  if(arr.length>shown.length){ html += '<div class="empty" style="padding:20px">검색·필터로 좁혀보세요 ('+(arr.length-shown.length)+'개 더)</div>'; }
  list.innerHTML = html;
}

function cardHTML(m){
  var id = m.n+"|"+m.la;
  var faved = fav.indexOf(id)>=0;
  var badge = isPer(m) ? '<span class="badge b-per">📅 '+m.t+'</span>' : '<span class="badge b-on">매일 여는 상설장</span>';
  var tags = (m.it||[]).map(function(x){ return '<span class="tag">'+x+'</span>'; }).join("");
  var meta = [];
  if(m.sp) meta.push('점포 <b>'+m.sp+'</b>개');
  meta.push(m.pk? '🅿️ 주차 <b>가능</b>' : '주차 없음');
  meta.push(m.wc? '🚻 화장실 <b>있음</b>' : '화장실 없음');
  var dd = fmtDist(m._d);
  var telBtn = m.tel
    ? '<button class="act act-tel" onclick="call(\''+m.tel+'\')">📞 전화</button>'
    : '';
  return ''+
    '<div class="card">'+
      '<div class="c-top">'+
        '<div class="c-name">'+esc(m.n)+'</div>'+
        (dd? '<div class="c-dist">'+dd+'</div>':'')+
      '</div>'+
      badge+
      '<div class="c-addr">📍 '+esc(m.ad)+'</div>'+
      '<div class="c-meta">'+meta.join('<span style="color:var(--line)">|</span>')+'</div>'+
      (tags? '<div class="c-tags">'+tags+'</div>':'')+
      jangBlock(m)+
      '<div class="c-actions">'+
        '<button class="act act-go" onclick="go('+m.la+','+m.lo+',\''+js(m.n)+'\')">🧭 길찾기</button>'+
        telBtn+
        '<button class="act act-sh" onclick="share(\''+js(m.n)+'\',\''+js(m.ad)+'\')">📤</button>'+
        '<button class="act act-fav '+(faved?'on':'')+'" onclick="toggleFav(\''+js(id)+'\',this)">'+(faved?'★':'☆')+'</button>'+
      '</div>'+
    '</div>';
}

function go(la,lo,name){
  var url = "https://map.kakao.com/link/to/"+encodeURIComponent(name)+","+la+","+lo;
  window.open(url, "_blank");
}
function call(tel){ window.location.href = "tel:"+tel.replace(/[^0-9+]/g,""); }

function share(name, addr){
  var text = "🛒 "+name+"\n📍 "+addr+"\n\n‘내 근처 시장가기’로 찾았어요!";
  // 토스 네이티브 공유 시트
  try{
    if(window.ReactNativeWebView){
      window.ReactNativeWebView.postMessage(JSON.stringify({ type:"SHARE_TEXT", text:text }));
      return;
    }
  }catch(e){}
  if(navigator.share){ navigator.share({ text:text }).catch(function(){}); return; }
  try{ navigator.clipboard.writeText(text); alert("복사됐어요!"); }catch(e){ alert(text); }
}

function toggleFav(id, btn){
  var i = fav.indexOf(id);
  if(i>=0){ fav.splice(i,1); } else { fav.push(id); }
  saveFav();
  if(state.tab==="fav"){ render(); }
  else {
    var on = fav.indexOf(id)>=0;
    btn.classList.toggle("on", on);
    btn.textContent = on ? "★" : "☆";
  }
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function js(s){ return (s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g," "); }
