<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>톡방 대화 분석하기 v1.7</title>
<style>
  :root{
    --coral:#F2664C; --coral-weak:#FFEDE8; --coral-press:#D9503A;
    --amber:#F5A623;
    --text:#26201E; --text2:#6B605C; --text3:#A79C97;
    --bg:#FAF4E8; --card:#FFFDF7; --line:#EFE7D6; --line2:#E5DAC5;
    --shadow:0 2px 8px rgba(120,90,50,.07);
    --me:#F2664C; --you:#4A90D9;
  }
  *{margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ touch-action:pan-y; }
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;
    background:#EBE1CE; color:var(--text);
    -webkit-font-smoothing:antialiased; overscroll-behavior:none;
  }
  .app{max-width:440px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative;}

  /* ===== 인트로 ===== */
  .intro{position:relative; padding:0 22px 30px; min-height:100vh; display:flex; flex-direction:column; justify-content:center;}
  .intro-hero{padding:0 0 24px; text-align:center;}
  .badge{display:inline-block; background:var(--coral-weak); color:var(--coral); font-size:13px; font-weight:800; padding:7px 14px; border-radius:20px; margin-bottom:16px;}
  .intro h1{font-size:28px; font-weight:800; letter-spacing:-.8px; line-height:1.32;}
  .intro h1 b{color:var(--coral);}
  .chips{display:flex; justify-content:center; flex-wrap:wrap; gap:8px; margin-top:20px;}
  .chips span{background:var(--card); box-shadow:var(--shadow); color:var(--text2); font-size:13px; font-weight:700; padding:9px 14px; border-radius:20px;}
  .feats{display:flex; flex-direction:column; gap:14px; margin-bottom:24px;}
  .feat{display:flex; align-items:center; gap:14px; background:var(--card); border-radius:16px; padding:17px 16px; box-shadow:var(--shadow);}
  .feat .ic{width:46px; height:46px; border-radius:13px; background:var(--coral-weak); display:flex; align-items:center; justify-content:center; font-size:23px; flex-shrink:0;}
  .feat .t{font-size:15px; font-weight:700;}
  .feat .d{font-size:13px; color:var(--text3); margin-top:2px;}

  .help{background:var(--card); border-radius:16px; box-shadow:var(--shadow); margin:6px 0 16px; overflow:hidden;}
  .help summary{padding:15px 18px; font-size:14px; font-weight:700; color:var(--text2); cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between;}
  .help summary::-webkit-details-marker{display:none;}
  .help summary::after{content:'▾'; color:var(--text3);}
  .help[open] summary::after{content:'▴';}
  .help .body{padding:0 18px 16px; font-size:13.5px; color:var(--text2); line-height:1.7;}
  .help .body b{color:var(--text);}

  .cta-area{margin-top:20px;}
  .filebtn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; background:var(--coral); color:#fff; border-radius:16px; border:none; font-family:inherit;
    padding:18px; font-size:17px; font-weight:800; cursor:pointer;
  }
  .filebtn:active{background:var(--coral-press);}
  .paste-link{text-align:center; margin-top:14px; color:var(--text3); font-size:14px; font-weight:600; cursor:pointer;}
  .privacy{text-align:center; margin-top:16px; font-size:12px; color:var(--text3); line-height:1.5;}

  /* ── 최상위 홈 ── */
  .home{ position:relative; display:flex; flex-direction:column; justify-content:center; min-height:100vh; padding:24px 22px; box-sizing:border-box; }
  .home-inner{ position:relative; z-index:1; width:100%; max-width:440px; margin:-3vh auto 0; }
  .wm-layer{ position:absolute; inset:0; overflow:hidden; z-index:0; pointer-events:none; }
  .wm-layer svg{ position:absolute; fill:var(--ink); opacity:.05; }
  .intro .intro-hero, .intro .cta-area, .intro .paste-sheet{ position:relative; z-index:1; }
  .home-count{ display:none; text-align:center; font-size:12px; font-weight:700; color:var(--text2); margin:2px 0 16px; }
  .home-count.show{ display:block; }
  .home-count b{ color:var(--coral); }
  .home-title{ font-size:30px; font-weight:800; line-height:1.25; letter-spacing:-.5px; color:var(--ink); text-align:center; margin:0 0 8px; }
  .home-title b{ color:var(--coral); }
  .home-sub{ text-align:center; font-size:14px; font-weight:600; color:var(--text3); margin:0 0 26px; }
  .home-btn{ display:flex; align-items:center; gap:14px; width:100%; box-sizing:border-box; background:var(--card); border:2.5px solid var(--ink); box-shadow:4px 4px 0 var(--ink); border-radius:18px; padding:18px; margin-bottom:16px; font-family:inherit; cursor:pointer; text-align:left; }
  .home-btn:active{ transform:translate(3px,3px); box-shadow:1px 1px 0 var(--ink); }
  .hb-emoji{ font-size:32px; line-height:1; flex-shrink:0; }
  .hb-txt{ display:flex; flex-direction:column; flex:1; }
  .hb-t{ font-size:18px; font-weight:800; color:var(--ink); letter-spacing:-.3px; }
  .hb-d{ font-size:12.5px; font-weight:600; color:var(--text3); margin-top:3px; }
  .hb-arrow{ font-size:26px; font-weight:800; color:var(--ink); flex-shrink:0; }
  .home-privacy{ text-align:center; font-size:11.5px; font-weight:600; color:var(--text3); line-height:1.6; margin-top:14px; }
  .home-back{ position:absolute; top:12px; right:12px; z-index:5; background:var(--card); border:2px solid var(--ink); box-shadow:2px 2px 0 var(--ink); border-radius:10px; padding:6px 12px; font-family:inherit; font-size:13px; font-weight:800; color:var(--ink); cursor:pointer; }
  .home-back:active{ transform:translate(2px,2px); box-shadow:0 0 0 var(--ink); }

  /* 붙여넣기 시트 */
  .paste-sheet{display:none; margin-top:14px;}
  .paste-sheet.show{display:block;}
  .paste-sheet textarea{width:100%; height:120px; border:1px solid var(--line2); border-radius:14px; padding:14px; font-family:inherit; font-size:14px; resize:none; background:var(--card); color:var(--text);}
  .paste-sheet button{width:100%; margin-top:10px; border:none; background:var(--coral); color:#fff; border-radius:14px; padding:15px; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer;}

  /* ===== 단계별 가이드 ===== */
  .guide{position:fixed; inset:0; margin:0 auto; max-width:440px; background:var(--bg); z-index:70; display:none; flex-direction:column;}
  .guide.show{display:flex;}
  .guide-top{display:flex; align-items:center; gap:12px; padding:14px 18px 6px;}
  .g-nav{border:none; background:none; font-family:inherit; font-size:14px; font-weight:700; color:var(--text3); cursor:pointer; padding:4px; white-space:nowrap;}
  .g-prog{flex:1; height:5px; background:var(--line); border-radius:3px; overflow:hidden;}
  .g-prog i{display:block; height:100%; background:var(--coral); border-radius:3px; transition:width .3s; width:20%;}
  .guide-scroll{flex:1; overflow-y:auto; padding:12px 22px 10px; display:flex; flex-direction:column;}
  .g-step-badge{align-self:flex-start; background:var(--coral-weak); color:var(--coral); font-size:12px; font-weight:800; padding:5px 12px; border-radius:14px; margin:4px 0 14px;}
  .g-title{font-size:24px; font-weight:800; letter-spacing:-.6px; line-height:1.3;}
  .g-title b{color:var(--coral);}
  .g-desc{font-size:15px; color:var(--text2); line-height:1.6; margin-top:10px;}
  .g-desc b{color:var(--text); font-weight:700;}
  .guide-foot{padding:12px 22px calc(22px + env(safe-area-inset-bottom));}
  .g-btns{display:flex; gap:10px;}
  .g-back{flex:0 0 34%; border:none; font-family:inherit; background:var(--card); color:var(--text2); box-shadow:var(--shadow); border-radius:16px; padding:17px; font-size:16px; font-weight:800; cursor:pointer;}
  .g-back:active{background:var(--line);}
  .g-next{flex:1; display:flex; align-items:center; justify-content:center; gap:8px; border:none; font-family:inherit; background:var(--coral); color:#fff; border-radius:16px; padding:17px; font-size:16px; font-weight:800; cursor:pointer;}
  .g-next:active{background:var(--coral-press);}
  .g-paste{text-align:center; margin-top:12px; color:var(--text3); font-size:13px; font-weight:600; cursor:pointer;}

  /* 목업 (톡 화면 흉내) */
  .mock{background:var(--card); border-radius:18px; box-shadow:var(--shadow); padding:16px 14px; margin:4px 0; border:1px solid var(--line);}
  .mk-bar{display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--line); font-size:14px; color:var(--text2); margin-bottom:6px;}
  .mk-bar .tt{font-weight:700; color:var(--text);}
  .mk-ham{font-size:20px; display:inline-block; padding:5px 8px; line-height:1;}
  .mk-row{display:flex; align-items:center; gap:11px; padding:9px 6px;}
  .mk-av{width:38px; height:38px; border-radius:12px; background:var(--line2); flex-shrink:0;}
  .mk-av.c{background:var(--coral-weak);}
  .mk-ln{flex:1;}
  .mk-l1{height:9px; width:52%; background:var(--line2); border-radius:5px;}
  .mk-l2{height:8px; width:74%; background:var(--line); border-radius:5px; margin-top:6px;}
  .mk-item{display:flex; align-items:center; gap:10px; padding:13px 12px; font-size:15px; color:var(--text); border-radius:12px;}
  .mk-item + .mk-item{margin-top:4px;}
  .mk-item .ei{font-size:19px;}
  .mk-up{text-align:center; padding:10px 0;}
  .mk-up .ic{font-size:46px;}
  .mk-up .t{font-size:16px; font-weight:700; margin-top:8px; color:var(--text2);}
  .mk-hint{text-align:center; font-size:12px; color:var(--text3); margin-top:10px;}
  .mk-sec{font-size:12px; color:var(--text3); font-weight:700; padding:4px 6px 8px;}
  .mk-opt{padding:11px 12px; border-radius:12px;}
  .mk-opt + .mk-opt{margin-top:6px;}
  .mk-opt .ot{font-size:15px; font-weight:700; color:var(--text);}
  .mk-opt .od{font-size:12px; color:var(--text3); margin-top:3px; line-height:1.4;}
  .mk-file{display:flex; align-items:center; gap:11px; padding:10px 8px; margin-bottom:6px;}
  .mk-fic{width:40px; height:40px; border-radius:11px; background:var(--coral-weak); color:var(--coral); font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .mk-fn{font-size:15px; font-weight:600; color:var(--text);}

  /* 움직이는 점선 강조 (JS 측정 SVG - 웹뷰 100% 호환) */
  .hi-ring{position:relative; background:var(--coral-weak); border-radius:12px;}
  .hi-ring .ants{position:absolute; left:-3px; top:-3px; pointer-events:none; overflow:visible;}
  .hi-ring .ants rect{fill:none; stroke:var(--coral); stroke-width:2.5; stroke-dasharray:7 6; stroke-linecap:round; transition:stroke-dashoffset .45s linear;}

  /* ===== 리포트 ===== */
  .report{display:none;}
  .report.show{display:block;}
  .appbar{display:flex; align-items:center; gap:9px; padding:12px 18px; background:var(--card); border-bottom:1px solid var(--line);}
  .app-ic{width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,#F5883E,#F2664C); display:flex; align-items:flex-end; justify-content:center; gap:2.5px; padding:0 5px 6px;}
  .app-ic span{width:3px; background:#fff; border-radius:2px;}
  .app-ic span:nth-child(1){height:7px;} .app-ic span:nth-child(2){height:12px;} .app-ic span:nth-child(3){height:9px;}
  .app-nm{font-size:15px; font-weight:800; letter-spacing:-.4px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:1; min-width:36px;}
  .app-meta{margin-left:auto; padding-left:10px; text-align:right; flex-shrink:0;}
  .am-names{font-size:13px; font-weight:800; color:var(--text); letter-spacing:-.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px;}
  .am-sub{font-size:11px; color:var(--text3); font-weight:600; margin-top:2px; white-space:nowrap;}
  .rep-head{
    background:linear-gradient(150deg,#F2664C,#F5883E); color:#fff;
    padding:13px 22px 12px; text-align:center; position:relative;
  }
  .rep-head .rh-title{font-size:20px; font-weight:800; letter-spacing:-.5px; line-height:1.2;}
  .rep-head .rh-meta{font-size:12.5px; opacity:.92; margin-top:5px; font-weight:600;}
  .rep-body{padding:6px 16px 40px;}

  /* 문장형 요약 히어로 */
  .summary{background:var(--card); border-radius:18px; padding:20px 19px; box-shadow:var(--shadow); margin-bottom:14px; border:1.5px solid var(--coral-weak);}
  .summary .s-lbl{font-size:12px; font-weight:800; color:var(--coral); letter-spacing:.3px; margin-bottom:10px;}
  .summary .s-txt{font-size:16.5px; line-height:1.72; color:var(--text); font-weight:500;}
  .summary .s-txt b{color:var(--coral); font-weight:800;}
  .summary .s-txt .u{color:var(--you); font-weight:800;}

  .card{background:var(--card); border-radius:18px; padding:18px; box-shadow:var(--shadow); margin-bottom:14px;}
  .card-h{font-size:15px; font-weight:800; letter-spacing:-.3px; margin-bottom:16px; color:var(--text); display:flex; align-items:center; gap:7px;}
  .card-h .e{font-size:17px;}

  /* 비율 바 */
  .ratio-names{display:flex; justify-content:space-between; font-size:14px; font-weight:700; margin-bottom:8px;}
  .ratio-names .me{color:var(--me);} .ratio-names .you{color:var(--you);}
  .ratio-bar{height:34px; border-radius:10px; overflow:hidden; display:flex; font-size:13px; font-weight:800; color:#fff;}
  .ratio-bar .seg{display:flex; align-items:center; justify-content:center; min-width:38px;}
  .ratio-sub{display:flex; justify-content:space-between; font-size:12px; color:var(--text3); margin-top:7px;}

  /* 큰 스탯 2개 */
  .stat2{display:flex; gap:12px;}
  .stat-box{flex:1; background:var(--bg); border-radius:14px; padding:15px; text-align:center;}
  .stat-box .n{font-size:24px; font-weight:800; letter-spacing:-.5px;}
  .stat-box .l{font-size:12px; color:var(--text3); margin-top:3px;}

  /* 시간대 막대 */
  .hours{display:flex; align-items:flex-end; gap:3px; height:110px; margin-top:6px;}
  .hbar{flex:1; background:var(--coral-weak); border-radius:4px 4px 0 0; position:relative; min-height:3px; transition:height .4s;}
  .hbar.peak{background:var(--coral);}
  .hlabels{display:flex; justify-content:space-between; font-size:10px; color:var(--text3); margin-top:6px;}
  .peak-txt{font-size:13px; color:var(--text2); margin-top:12px; text-align:center; background:var(--bg); border-radius:10px; padding:9px;}
  .peak-txt b{color:var(--coral);}

  /* 월별 (세로 막대) */
  .mchart{display:flex; align-items:flex-end; gap:3px; height:120px; padding-top:6px;}
  .mcol{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; min-width:0;}
  .mcol .mbar{width:100%; max-width:20px; background:linear-gradient(180deg,#F5A623,#F2664C); border-radius:4px 4px 0 0; min-height:3px;}
  .mcol .mbar.hi{background:linear-gradient(180deg,#F2664C,#D9503A);}
  .mcol .mx{font-size:9px; color:var(--text3); margin-top:5px; white-space:nowrap; transform:rotate(-45deg); transform-origin:center; height:14px;}
  .mchart-peak{text-align:center; margin-top:14px; font-size:13px; color:var(--text2); background:var(--bg); border-radius:10px; padding:9px;}
  .mchart-peak b{color:var(--coral);}

  /* 태그(단어) */
  .tags{display:flex; flex-wrap:wrap; gap:6px;}
  .tag{background:var(--coral-weak); color:var(--coral); border-radius:14px; padding:5px 10px; font-size:12.5px; font-weight:700;}
  .tag .c{color:var(--text3); font-weight:600; font-size:10.5px; margin-left:3px;}

  /* 이모지 */
  .emojis{display:flex; flex-wrap:wrap; gap:7px;}
  .emo{background:var(--bg); border-radius:11px; padding:7px 10px; text-align:center; min-width:44px;}
  .emo .e{font-size:19px;} .emo .c{font-size:10.5px; color:var(--text3); margin-top:1px; font-weight:600;}

  .media-row{display:flex; gap:12px;}
  .media-box{flex:1; background:var(--bg); border-radius:14px; padding:14px; text-align:center;}
  .media-box .e{font-size:24px;} .media-box .n{font-size:19px; font-weight:800; margin-top:4px;} .media-box .l{font-size:11px; color:var(--text3);}

  .rep-actions{display:flex; gap:10px; margin-top:6px;}
  .rep-actions button{flex:1; border:none; border-radius:15px; padding:16px 0; font-size:15px; font-weight:800; font-family:inherit; cursor:pointer;}
  .btn-share{background:var(--coral); color:#fff;}
  .btn-share:active{background:var(--coral-press);}
  .btn-again{background:var(--card); color:var(--text2); box-shadow:var(--shadow);}

  /* 토스트 */
  .toast{position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(20px);
    background:rgba(40,30,25,.94); color:#fff; padding:13px 22px; border-radius:14px;
    font-size:14px; font-weight:600; opacity:0; transition:all .3s; z-index:100; max-width:88%; text-align:center; pointer-events:none;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* 로딩 */
  .loading{position:fixed; inset:0; background:rgba(250,244,232,.96); display:none; align-items:center; justify-content:center; flex-direction:column; z-index:200;}
  .loading.show{display:flex;}
  .spin{width:44px; height:44px; border:4px solid var(--coral-weak); border-top-color:var(--coral); border-radius:50%; animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .loading p{margin-top:16px; color:var(--text2); font-size:14px; font-weight:600;}
  /* ============================================================
     NEO-BRUTAL THEME (MOTION INTRO 스타일 · 그냥갈까 옐로우)
     ============================================================ */
  :root{
    --ink:#141414;
    --yellow:#FBF1D3; --yellow-dk:#ECDDAE;
    --card:#FFFFFF;
    --coral:#FF6B4A; --coral-weak:#FFE2D8; --coral-press:#E8532F;
    --mint:#25CDBB; --blue:#3B9EE3; --pink:#FF5C9D;
    --shadow:4px 4px 0 var(--ink);
  }
  body{ background:var(--yellow-dk); }
  .app,.intro,.report,.guide{ background:var(--yellow); }

  /* 카드 공통: 흰 배경 + 검정 테두리 + 하드 섀도 */
  .card,.summary,.ratio,.mbox,.diary,.gb-write,.feat,.spark,.words,
  .mchart-peak,.peak-txt{ 
    border:2.5px solid var(--ink) !important; box-shadow:var(--shadow) !important; border-radius:16px !important;
  }
  .summary{ border-color:var(--ink) !important; }
  .mchart-peak,.peak-txt{ box-shadow:2px 2px 0 var(--ink) !important; }

  /* 인트로 = 브라우저 창 목업 */
  .intro-hero{ background:var(--card); border:3px solid var(--ink); border-radius:18px; box-shadow:6px 6px 0 var(--ink); padding:44px 22px 30px !important; position:relative; margin-top:34px; }
  .intro-hero::before{ content:''; position:absolute; top:14px; left:16px; width:11px; height:11px; border-radius:50%; background:var(--coral); box-shadow:19px 0 0 var(--mint), 38px 0 0 var(--blue); }
  .hero-count{ position:absolute; top:9px; right:16px; z-index:2; font-size:11px; font-weight:700; color:var(--text2); display:none; letter-spacing:-.2px; }
  .hero-count.show{ display:block; }
  .hero-count b{ color:#B3ADA3; }
  .intro-hero::after{ content:''; position:absolute; top:36px; left:0; right:0; border-top:2.5px solid var(--ink); }
  .badge{ background:var(--mint) !important; color:var(--ink) !important; border:2px solid var(--ink); box-shadow:2px 2px 0 var(--ink); border-radius:10px !important; }
  .intro h1{ font-size:34px !important; line-height:1.15 !important; color:var(--ink); letter-spacing:-1px; }
  .intro h1 b{ color:var(--coral) !important; text-shadow:3px 3px 0 var(--ink); }
  .chips span{ background:var(--card) !important; color:var(--ink) !important; border:2px solid var(--ink); box-shadow:2px 2px 0 var(--ink); border-radius:10px !important; font-weight:800 !important; }

  /* 버튼: 프라이머리 = 검정, 세컨더리 = 흰색 (하드 섀도 + 눌림) */
  .filebtn,.g-next,.btn-share,.paste-sheet button,.sheet-btn{
    background:var(--ink) !important; color:#fff !important; border:2.5px solid var(--ink) !important;
    border-radius:14px !important; box-shadow:5px 5px 0 rgba(0,0,0,.25) !important; transition:transform .06s, box-shadow .06s;
  }
  .filebtn:active,.g-next:active,.btn-share:active,.paste-sheet button:active,.sheet-btn:active{
    transform:translate(3px,3px); box-shadow:2px 2px 0 rgba(0,0,0,.25) !important;
  }
  .btn-again,.g-back{

<script>
  /* ── 파서 ── */
  function parseKakao(raw){
    const lines=raw.split('\n');
    const reAnd=/^\uFEFF?(\d{4})년 (\d{1,2})월 (\d{1,2})일 (오전|오후) (\d{1,2}):(\d{2}), (.+?) : (.*)$/;
    const reIos=/^\uFEFF?(\d{4})\. (\d{1,2})\. (\d{1,2})\. (오전|오후) (\d{1,2}):(\d{2}), (.+?) : (.*)$/;
    const msgs=[]; let cur=null;
    for(let i=0;i<lines.length;i++){
      const l=lines[i].replace(/\r$/,'');
      let m=reAnd.exec(l)||reIos.exec(l);
      if(m){
        let h=parseInt(m[5],10)%12; if(m[4]==='오후') h+=12;
        cur={y:+m[1],mo:+m[2],d:+m[3],h:h,mi:+m[6],who:m[7],text:m[8]};
        msgs.push(cur);
      }else{
        if(l.trim()===''||l.indexOf('님과 카카오톡')>=0||l.indexOf('저장한 날짜')>=0) continue;
        if(/^\uFEFF?\d{4}[년.]/.test(l) && l.indexOf(' : ')<0) continue; // 날짜 구분선
        if(cur) cur.text+='\n'+l; // 멀티라인 이어짐
      }
    }
    return msgs;
  }

  const STOP=new Set(['오전','오후','사진','이모티콘','동영상','삭제된','메시지입니다','페이스톡','종료','샵검색','음성메시지']);
  const emojiRe=/[\u{1F000}-\u{1FAFF}\u2600-\u27BF\u2660-\u2668\u2764\u2661\u2665]/gu;

  function analyze(msgs){
    if(!msgs.length) return null;
    const byWho={}, byHour=new Array(24).fill(0), byMonth={}, firstOfDay={}, words={}, emojis={};
    const reactByWho={}, starterByWho={}, nightByWho={}, mediaByWho={}, charByWho={}, textCntByWho={}, weekendByWho={}, daysByWho={}; let prevMsgTs=null;
    let media={photo:0,emoticon:0,video:0};
    const people=[];
    let seenDay=new Set();
    // 답장 텀
    let gaps=[], prev=null;
    for(const m of msgs){
      byWho[m.who]=(byWho[m.who]||0)+1;
      if(people.indexOf(m.who)<0) people.push(m.who);
      byHour[m.h]++;
      if(m.h<6) nightByWho[m.who]=(nightByWho[m.who]||0)+1;
      const dow=new Date(m.y,m.mo-1,m.d).getDay();
      if(dow===0||dow===6) weekendByWho[m.who]=(weekendByWho[m.who]||0)+1;
      const mk=m.y+'-'+String(m.mo).padStart(2,'0');
      byMonth[mk]=(byMonth[mk]||0)+1;
      const dk=m.y+'/'+m.mo+'/'+m.d;
      (daysByWho[m.who]||(daysByWho[m.who]=new Set())).add(dk);
      if(!seenDay.has(dk)){seenDay.add(dk); firstOfDay[m.who]=(firstOfDay[m.who]||0)+1;}
      const t=m.text;
      if(t==='사진'){ media.photo++; mediaByWho[m.who]=(mediaByWho[m.who]||0)+1; }
      else if(t==='이모티콘'){ media.emoticon++; mediaByWho[m.who]=(mediaByWho[m.who]||0)+1; }
      else if(t==='동영상'){ media.video++; mediaByWho[m.who]=(mediaByWho[m.who]||0)+1; }
      else{
        charByWho[m.who]=(charByWho[m.who]||0)+t.length;
        textCntByWho[m.who]=(textCntByWho[m.who]||0)+1;
        (t.match(/[가-힣]{2,}/g)||[]).forEach(w=>{if(!STOP.has(w)) words[w]=(words[w]||0)+1;});
        (t.match(emojiRe)||[]).forEach(e=>emojis[e]=(emojis[e]||0)+1);
      }
      // 반응봇: ㅋ런/ㅎ런 + 이모지 수
      const react=(t.match(/ㅋ{2,}/g)||[]).length + (t.match(/ㅎ{2,}/g)||[]).length + (t.match(emojiRe)||[]).length;
      if(react) reactByWho[m.who]=(reactByWho[m.who]||0)+react;
      // 대화 스타터: 직전 메시지와 60분 이상 벌어지면 먼저 말 건 것
      const tsNow=new Date(m.y,m.mo-1,m.d,m.h,m.mi).getTime();
      if(prevMsgTs===null || (tsNow-prevMsgTs)>60*60000) starterByWho[m.who]=(starterByWho[m.who]||0)+1;
      prevMsgTs=tsNow;
      // 답장 텀: 화자 바뀌고 같은 날 근처
      const ts=new Date(m.y,m.mo-1,m.d,m.h,m.mi).getTime();
      if(prev && prev.who!==m.who){
        const diff=(ts-prev.ts)/60000;
        if(diff>=0 && diff<=720) gaps.push(diff);
      }
      prev={who:m.who,ts:ts};
    }
    gaps.sort((a,b)=>a-b);
    const medGap=gaps.length?gaps[Math.floor(gaps.length/2)]:null;
    people.forEach(n=>{delete words[n];}); // 참여자 이름은 자주 쓴 말에서 제외
    const sortedMonth=Object.keys(byMonth).sort();
    const topWords=Object.entries(words).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const topEmojis=Object.entries(emojis).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const peakHour=byHour.indexOf(Math.max(...byHour));
    const first=msgs[0], last=msgs[msgs.length-1];
    const attendByWho={}; for(const w in daysByWho) attendByWho[w]=daysByWho[w].size;
    return {total:msgs.length, byWho, people, byHour, byMonth:sortedMonth.map(k=>[k,byMonth[k]]),
      firstOfDay, reactByWho, starterByWho, nightByWho, mediaByWho, topWords, topEmojis, media, medGap, peakHour,
      charByWho, textCntByWho, weekendByWho, attendByWho,
      days:seenDay.size,
      range:`${first.y}.${first.mo}.${first.d} ~ ${last.y}.${last.mo}.${last.d}`};
  }

  /* ── 모드 설정 (solo=일대일 / group=단톡방) ── */
  let MODE='group';
  const APPCFG = {

    solo:{ kw:'톡 대화 분석', badge:'💬 톡 대화 분석', h1:'우리 둘의 톡<br><b>순위·통계 보기</b>', badgeTitle:'🏆 대화 배지', rankTitle:'메시지 비율', cardT1:'카톡 대화 ', cardT2:'분석', cardRank:'메시지 비율', footer:'카톡 대화 분석', countApi:'https://talkreport-counter.san0231ai.workers.dev', flag:'talkall_counted' },

  /* ── 렌더 ── */
  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  // 값 비율(0~1) → 색상 (옅은 크림 → 앰버 → 진한 코랄)
  function heatRGB(t){
    t=Math.max(0,Math.min(1,t));
    const s=[[0,255,235,205],[0.4,247,180,90],[0.7,242,120,70],[1,214,70,42]];
    let a=s[0],b=s[s.length-1];
    for(let i=0;i<s.length-1;i++){ if(t>=s[i][0]&&t<=s[i+1][0]){a=s[i];b=s[i+1];break;} }
    const f=(t-a[0])/((b[0]-a[0])||1);
    return [1,2,3].map(k=>Math.round(a[k]+(b[k]-a[k])*f));
  }
  function heatCss(t){
    const c=heatRGB(t), d=c.map(x=>Math.round(x*0.86));
    return `linear-gradient(180deg,rgb(${c.join(',')}),rgb(${d.join(',')}))`;
  }

  // 월이 너무 많으면 2개월 단위로 묶음. cap 이하면 그대로.
  const MONTH_CAP=36;
  function binMonths(bm){
    bm=bm||[];
    if(bm.length<=MONTH_CAP){
      return { series: bm.map(m=>({v:m[1], lab:parseInt(m[0].split('-')[1],10), range:parseInt(m[0].split('-')[1],10)+'월'})), binned:false };
    }
    const out=[];
    for(let i=0;i<bm.length;i+=2){
      const a=bm[i], b=bm[i+1];
      const sm=parseInt(a[0].split('-')[1],10);
      const em=parseInt((b||a)[0].split('-')[1],10);
      out.push({ v:a[1]+(b?b[1]:0), lab:sm, range: b?`${sm}~${em}월`:`${sm}월` });
    }
    return { series: out, binned:true };
  }

  /* 문장형 요약 (히어로) */
  function composeSummary(a){
    const p=a.people, nA=p[0], nB=p[1]||'';
    const cntA=a.byWho[nA]||0, cntB=a.byWho[nB]||0;
    const pctA=Math.round(cntA/a.total*100), pctB=100-pctA;
    const moreWho=cntA>=cntB?nA:nB, morePct=Math.max(pctA,pctB);
    const fA=a.firstOfDay[nA]||0, fB=a.firstOfDay[nB]||0;
    const initiator=fA>=fB?nA:nB;
    const ap=a.peakHour<12?'오전':'오후'; let h12=a.peakHour%12; if(h12===0)h12=12;
    const peak=`${ap} ${h12}시`;
    let trend='꾸준히 이야기하고 있어요';
    const mv=a.byMonth.map(m=>m[1]);
    if(mv.length>=4){
      const half=Math.floor(mv.length/2);
      const early=mv.slice(0,half).reduce((x,y)=>x+y,0)/half;
      const late=mv.slice(half).reduce((x,y)=>x+y,0)/(mv.length-half);
      if(late>early*1.2) trend='요즘 대화가 점점 늘고 있어요';
      else if(late<early*0.8) trend='예전보다는 조금 뜸해졌어요';
    }
    const wrap=n=> n===nA?`<b>${esc(n)}</b>`:`<span class="u">${esc(n)}</span>`;
    let s=`지난 <b>${a.days}일</b> 동안 <b>${a.total.toLocaleString()}번</b> 대화를 나눴어요. `;
    if(Math.abs(pctA-pctB)<=4) s+=`둘이 <b>비슷하게</b> 주고받았고, `;
    else s+=`${wrap(moreWho)}님이 <b>${morePct}%</b>로 조금 더 많이 보냈고, `;
    if(moreWho===initiator) s+=`먼저 연락하는 쪽도 주로 ${wrap(initiator)}님이에요. `;
    else s+=`먼저 연락은 주로 ${wrap(initiator)}님이 해요. `;
    s+=`가장 자주 이야기하는 시간은 <b>${peak}</b>이고, ${trend}.`;
    if(a.topWords.length){
      const ws=a.topWords.slice(0,3).map(w=>`'${esc(w[0])}'`).join(' ');
      s+=` ${ws} 같은 말을 자주 썼어요.`;
    }
    return {html:s, moreWho, morePct, initiator, peak, nA, nB};
  }

  function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
  function rtop(c,x,y,w,h,r){c.beginPath();c.moveTo(x,y+h);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h);c.closePath();}

  function buildShareCard(r){
    const W=1080,H=2030,P=64;

    const x=cv.getContext('2d');

    const MUTY='rgba(20,20,20,.60)', MUTW='#9A9A9A';

    // 말풍선 (크림 채움 + 잉크 테두리 + 잉크 점 = 앱 아이콘과 동일)
    const bx0=W/2-52, by0=452, bw0=104, bh0=76;

    x.fillStyle=CREAM; x.beginPath(); x.moveTo(tx1,tyTop); x.lineTo(tipx,tipy); x.lineTo(tx2,tyTop); x.closePath(); x.fill();
    x.strokeStyle=INK; x.lineWidth=5; x.lineJoin='round'; x.beginPath(); x.moveTo(tx1,tyTop); x.lineTo(tipx,tipy); x.lineTo(tx2,tyTop); x.stroke();
    x.fillStyle=CREAM; rr(x,bx0,by0,bw0,bh0,26); x.fill(); x.strokeStyle=INK; x.lineWidth=5; rr(x,bx0,by0,bw0,bh0,26); x.stroke();
    x.fillStyle=INK; [-24,0,24].forEach(dx=>{ x.beginPath(); x.arc(W/2+dx, by0+bh0/2, 7, 0, 7); x.fill(); });

    // 참여자 수

      const col=i%cols, row=(i/cols)|0;

      rr(x,barX,ry,barW,rowH,14); x.strokeStyle=INK; x.lineWidth=4; x.stroke();
      x.textAlign='right'; x.fillStyle=INK; x.font=`800 26px ${KF}`;

      let wx=P, wy=cy+28; const chipH=62, gx=14, gy=14;

        x.font=`700 22px ${KF}`; const cW=x.measureText(String(c)).width;

  function b64toBlob(b64,type){ const bin=atob(b64); const arr=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i); return new Blob([arr],{type:type||'image/png'}); }

    const d=new Date(), p2=n=>String(n).padStart(2,'0');
    const prefix=(MODE==='solo')?'1on1talk':'dantalk';
    const filename=prefix+'_'+p2(d.getHours())+p2(d.getMinutes())+p2(d.getSeconds())+'.png';
    if(window.parent!==window){
      // 토스 앱(iframe) → 부모 App.tsx가 SAVE_IMAGE 받아 갤러리 저장, 결과는 SAVE_RESULT로 회신
      toast('이미지 저장 중...');
      window._saveAcked=false;
      window.parent.postMessage({type:'SAVE_IMAGE', base64, filename, mimeType:'image/png'}, '*');
      clearTimeout(window._saveFallback);
      window._saveFallback=setTimeout(()=>{ if(!window._saveAcked) toast('갤러리를 확인해보세요 ✨'); }, 1500);
    } else if(navigator.canShare){
      try{
        const file=new File([b64toBlob(base64)], filename, {type:'image/png'});
        if(navigator.canShare({files:[file]})){ navigator.share({files:[file]}).catch(()=>{}); return; }
      }catch(e){}
      const a=document.createElement('a'); a.download=filename; a.href=dataUrl; document.body.appendChild(a); a.click(); document.body.removeChild(a); toast('요약 이미지를 저장했어요 ✨');
    } else {
      const a=document.createElement('a'); a.download=filename; a.href=dataUrl; document.body.appendChild(a); a.click(); document.body.removeChild(a); toast('요약 이미지를 저장했어요 ✨');
    }
  }

  function showLoading(v){document.getElementById('loading').classList.toggle('show',v);}
  let tt; function toast(m){const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2600);}

  /* ── 저장 결과 수신 (App.tsx → SAVE_RESULT) : 마크집사 검증 패턴 ── */
  window.addEventListener('message', function(e){
    if(e.data && e.data.type==='SAVE_RESULT'){
      window._saveAcked=true; clearTimeout(window._saveFallback);
      if(e.data.ok) toast('요약 이미지를 저장했어요! 갤러리에서 공유해보세요 ✨');
      else toast('저장 실패: '+(e.data.error||'알 수 없는 오류'));
    }
  });

  /* ── 핀치줌·더블탭 확대 완전 차단 (iOS 제스처 + 멀티터치 시작/이동 + 더블탭 + ctrl휠) ── */
  ['gesturestart','gesturechange','gestureend'].forEach(function(ev){
    document.addEventListener(ev, function(e){ e.preventDefault(); }, {passive:false});
  });
  document.addEventListener('touchstart', function(e){ if(e.touches.length>1){ e.preventDefault(); } }, {passive:false});
  document.addEventListener('touchmove', function(e){ if(e.touches.length>1){ e.preventDefault(); } }, {passive:false});
  document.addEventListener('wheel', function(e){ if(e.ctrlKey){ e.preventDefault(); } }, {passive:false});
  let _lastTouchEnd=0;
  document.addEventListener('touchend', function(e){
    const now=Date.now();
    if(now-_lastTouchEnd<=300){ e.preventDefault(); }
    _lastTouchEnd=now;
  }, {passive:false});

  /* ── 사용자 카운트 (홈에서 두 워커 합산 표시 / 분석 시 1회 +1) ── */
  async function readCount(api){
    if(!api) return 0;
    try{ const r=await fetch(api.replace(/\/$/,'')+'/', {method:'GET'}); if(!r.ok) return 0; const d=await r.json(); return (d&&typeof d.count==='number')?d.count:0; }
    catch(e){ return 0; }
  }
  async function loadHomeCount(){
    // solo/group이 같은 카운터 서버면 한 번만 읽어 2배 방지, 다르면 각각 더함
    const sApi=APPCFG.solo.countApi, gApi=APPCFG.group.countApi;
    let total=0;
    if(sApi && gApi && sApi===gApi){ total=await readCount(sApi); }
    else{ const [a,b]=await Promise.all([readCount(sApi), readCount(gApi)]); total=a+b; }
    const el=document.getElementById('homeCount');
    if(el && total>0){ el.innerHTML=`🔥 <b>${total.toLocaleString()}</b>명 분석`; el.classList.add('show'); }
  }
  /* 앱 모티브(말풍선) SVG 워터마크 흩뿌리기 */
  function paintWatermarks(){
    const bubble='<path d="M6 4h12a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3h-5l-5 4v-4H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3z"/>';
    const homeSpots=[[8,8,84,-14],[16,74,56,12],[40,-3,118,8],[52,80,96,-10],[74,5,70,16],[84,66,86,-8],[92,38,54,6]];
    const introSpots=[[10,6,70,-12],[24,80,56,10],[52,-4,110,7],[64,82,90,-9],[86,9,68,14],[90,60,78,-6]];
    const mk=(t,l,w,r)=>`<svg viewBox="0 0 24 24" style="top:${t}%;left:${l}%;width:${w}px;height:${w}px;transform:rotate(${r}deg)">${bubble}</svg>`;
    const h=document.querySelector('#home .wm-layer'); if(h && !h.childNodes.length) h.innerHTML=homeSpots.map(a=>mk(a[0],a[1],a[2],a[3])).join('');
    const i=document.querySelector('#intro .wm-layer'); if(i && !i.childNodes.length) i.innerHTML=introSpots.map(a=>mk(a[0],a[1],a[2],a[3])).join('');
  }
  // 채팅방 지문 (참여자+메시지수+기간 → 같은 방이면 같은 값)
  function chatFingerprint(a){
    try{
      var base=(a.people||[]).slice().sort().join('|')+'#'+a.total+'#'+(a.range||'');
      var hh=0; for(var i=0;i<base.length;i++){ hh=((hh<<5)-hh+base.charCodeAt(i))|0; }
      return 'c'+(hh>>>0).toString(36);
    }catch(e){ return null; }
  }
  async function hitCount(a){
    const c=CFG(); if(!c.countApi) return;
    // 채팅방별 1회: 이미 분석한 방이면 skip
    var fp=chatFingerprint(a); if(!fp) return;
    var key='talkall_seen_chats';
    var seen={}; try{ seen=JSON.parse(localStorage.getItem(key)||'{}'); }catch(e){}
    if(seen[fp]) return;                 // 이미 센 채팅방
    try{
      await fetch(c.countApi.replace(/\/$/,'')+'/hit', {method:'GET'});
      seen[fp]=1; try{ localStorage.setItem(key,JSON.stringify(seen)); }catch(e){}
    }catch(e){}
  }
  paintWatermarks();
  loadHomeCount();
</script>
</body>
</html>
